name: Daily AI Digest

on:
  schedule:
    # 10:00 AM CET = 09:00 UTC (standard time) / 08:00 UTC (summer/CEST)
    # Using 08:00 UTC to hit 10:00 AM during CEST (Belgian summer time)
    - cron: "0 8 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI for testing

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic slack-sdk

      - name: Run AI digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL:     ${{ secrets.SLACK_CHANNEL }}
        run: python digest_runner.py
